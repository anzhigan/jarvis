services:
  db:
    ports: !reset []
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

  minio:
    ports: !reset []
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

  api:
    ports: !reset []
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@db:5432/jarvis
      SECRET_KEY: ${SECRET_KEY}
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET_NAME: jarvis
      S3_PUBLIC_URL: https://jarvnote.ru/s3/jarvis
      ALLOWED_ORIGINS: https://jarvnote.ru,https://www.jarvnote.ru

  frontend:
    ports: !override
      - "127.0.0.1:8080:80"